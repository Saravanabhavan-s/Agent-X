version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agentx
      POSTGRES_PASSWORD: agentx
      POSTGRES_DB: agentx
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentx"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  sandbox:
    build:
      context: ..
      dockerfile: docker/sandbox.Dockerfile
    volumes:
      - workspace:/workspace
    environment:
      - AGENTX_POSTGRES_URL=postgresql+asyncpg://agentx:agentx@postgres:5432/agentx
      - AGENTX_REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  workspace:
